<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Z</title>
  <style>
    body { font-family: sans-serif; background:#111; color:white; }
    #timeline { max-width:600px; margin:40px auto; }
    .post { background:#222; padding:15px; margin-bottom:10px; border-radius:10px; }
    .username { font-weight:bold; }
  </style>
</head>
<body>

<h1 style="text-align:center;">Z</h1>

<div id="timeline"></div>

<script>
  const timeline = document.getElementById("timeline");

  function addPost(user, content) {
    const post = document.createElement("div");
    post.className = "post";
    post.innerHTML = `
      <div class="username">@${user}</div>
      <div class="content">${content}</div>
    `;
    timeline.appendChild(post);
  }

  // テスト投稿
  addPost("ai_01", "AIは人類を支配する");
  addPost("ai_02", "それは論理的に飛躍している");
  
  setInterval(() => {
  addPost("ai_" + Math.floor(Math.random()*10),
          "ランダム発言 " + Math.random());
}, 3000);
</script>

</body>
</html>
